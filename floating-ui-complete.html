<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating UI Complete</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --ink: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-2: #3b82f6;
      --line: #dbe3f3;
      --glass: rgba(255,255,255,.92);
      --shadow: 0 14px 30px rgba(20,46,110,.22);
      --ease: cubic-bezier(.2,.85,.2,1);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      color: var(--ink);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .hint {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 20;
      font-size: 13px;
      color: var(--muted);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .dock {
      position: relative;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid #cbd8f4;
      background: radial-gradient(circle at center, rgba(59,130,246,.08), rgba(59,130,246,.02) 62%, transparent 70%);
    }

    .ring {
      position: absolute;
      inset: 28px;
      border-radius: 50%;
      border: 1px dashed rgba(59,130,246,.34);
      pointer-events: none;
      animation: spin 24s linear infinite;
    }

    .ring.r2 {
      inset: 68px;
      animation-direction: reverse;
      animation-duration: 16s;
      opacity: .75;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 82px;
      height: 82px;
      margin-left: -41px;
      margin-top: -41px;
      border-radius: 50%;
      border: 1px solid #9ac0ff;
      background: linear-gradient(140deg, var(--primary), var(--primary-2));
      color: #fff;
      font-size: 42px;
      font-weight: 700;
      display: grid;
      place-items: center;
      box-shadow: 0 0 0 8px rgba(59,130,246,.15), var(--shadow);
      cursor: pointer;
      transition: transform .18s var(--ease), box-shadow .18s var(--ease);
      z-index: 10;
    }

    .center:active { transform: scale(.96); }

    .layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .layer.show { pointer-events: auto; }

    .bubble {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(.76);
      opacity: 0;
      transition: transform .26s var(--ease), opacity .22s var(--ease), box-shadow .2s var(--ease);
      display: grid;
      place-items: center;
      text-align: center;
      cursor: pointer;
      border: 1px solid transparent;
      pointer-events: none;
      line-height: 1.15;
      padding: 8px;
    }

    .layer.show .bubble {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .layer.show .bubble:nth-child(1){transition-delay:.02s}
    .layer.show .bubble:nth-child(2){transition-delay:.06s}
    .layer.show .bubble:nth-child(3){transition-delay:.1s}
    .layer.show .bubble:nth-child(4){transition-delay:.14s}

    .module {
      width: 64px;
      height: 64px;
      background: linear-gradient(140deg, #2f67e6, #4f9dff);
      color: #fff;
      border-color: #b9d3ff;
      font-size: 32px;
      font-weight: 700;
      box-shadow: 0 8px 16px rgba(26,76,178,.24);
    }

    .action {
      width: 72px;
      height: 72px;
      background: var(--glass);
      color: #2f4f88;
      border-color: #c9d8f5;
      font-size: 12px;
      box-shadow: 0 7px 14px rgba(29,58,117,.14);
    }

    .item {
      width: 86px;
      height: 86px;
      background: var(--glass);
      color: #2b436f;
      border-color: #c9d8f5;
      font-size: 11px;
      box-shadow: 0 6px 12px rgba(29,58,117,.12);
      cursor: default;
    }

    .item strong { display: block; font-size: 12px; margin-bottom: 2px; }

    .bubble:hover { box-shadow: 0 0 0 6px rgba(59,130,246,.18), 0 10px 18px rgba(26,76,178,.22); }

    .status {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 13px;
      color: #40547f;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
    }

    .toolbar {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    .toolbar button {
      border: 1px solid var(--line);
      background: #fff;
      color: #334155;
      border-radius: 10px;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="hint">触摸流程：模块 → 功能 → 内容</div>
  <div class="toolbar">
    <button id="backBtn">返回</button>
    <button id="resetBtn">重置</button>
  </div>

  <div class="stage">
    <section class="dock" id="dock">
      <div class="ring"></div>
      <div class="ring r2"></div>
      <button class="center" id="centerBtn" title="回到模块层">D</button>
      <div class="layer show" id="moduleLayer"></div>
      <div class="layer" id="actionLayer"></div>
      <div class="layer" id="itemLayer"></div>
    </section>
  </div>

  <div class="status" id="status">当前：模块层</div>

  <script>
    const modules = [
      { key: 'daily', label: '日', name: '每日内容' },
      { key: 'common', label: '常', name: '常用' },
      { key: 'assets', label: '资', name: '资源库' },
      { key: 'cards', label: '卡', name: '浏览器卡片' }
    ];

    const model = {
      daily: {
        actions: ['搜索', '复制', '转常用', '删上次'],
        items: [['会议要点', '2分钟前'], ['测试命令', '8分钟前'], ['日报草稿', '20分钟前'], ['沟通模板', '35分钟前']]
      },
      common: {
        actions: ['搜索', '复制', '移常用', '删除'],
        items: [['登录指引', '1分钟前'], ['提测模板', '9分钟前'], ['SQL合集', '21分钟前'], ['路径片段', '45分钟前']]
      },
      assets: {
        actions: ['搜索', '源文件', '文件夹', '备份'],
        items: [['需求评审', 'docx'], ['素材包', 'zip'], ['演示视频', 'mp4'], ['UI资源目录', 'folder']]
      },
      cards: {
        actions: ['搜域名', '打开卡', '注入', '测试'],
        items: [['shop.demo', '3分钟前'], ['portal.ex', '15分钟前'], ['ads.board', '37分钟前'], ['data.panel', '59分钟前']]
      }
    };

    const dock = document.getElementById('dock');
    const moduleLayer = document.getElementById('moduleLayer');
    const actionLayer = document.getElementById('actionLayer');
    const itemLayer = document.getElementById('itemLayer');
    const statusEl = document.getElementById('status');

    const state = { level: 1, module: null, action: null };

    function center() {
      const r = dock.getBoundingClientRect();
      return { x: r.width / 2, y: r.height / 2, s: Math.min(r.width, r.height) };
    }

    function polar(cx, cy, rr, deg) {
      const rad = (deg - 90) * Math.PI / 180;
      return { x: cx + rr * Math.cos(rad), y: cy + rr * Math.sin(rad) };
    }

    function setPos(el, p) {
      el.style.left = `${p.x}px`;
      el.style.top = `${p.y}px`;
    }

    function touchBind(el, fn) {
      let lock = false;
      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        if (lock) return;
        lock = true;
        fn();
        setTimeout(() => { lock = false; }, 120);
      }, { passive: false });
    }

    function clear(layer) { layer.innerHTML = ''; }

    function renderModules() {
      clear(moduleLayer);
      const c = center();
      const radius = c.s * 0.33;
      const start = -42;
      const step = 84;
      modules.forEach((m, i) => {
        const b = document.createElement('button');
        b.className = 'bubble module';
        b.textContent = m.label;
        b.title = m.name;
        setPos(b, polar(c.x, c.y, radius, start + step * i));
        touchBind(b, () => {
          state.level = 2;
          state.module = m.key;
          state.action = null;
          render();
        });
        moduleLayer.appendChild(b);
      });
    }

    function renderActions() {
      clear(actionLayer);
      if (!state.module) return;
      const c = center();
      const radius = c.s * 0.22;
      const actions = model[state.module].actions;
      const start = -36;
      const step = 72;
      actions.forEach((name, i) => {
        const b = document.createElement('button');
        b.className = 'bubble action';
        b.textContent = name;
        setPos(b, polar(c.x, c.y, radius, start + step * i));
        touchBind(b, () => {
          state.level = 3;
          state.action = i;
          render();
        });
        actionLayer.appendChild(b);
      });
    }

    function renderItems() {
      clear(itemLayer);
      if (state.module == null || state.action == null) return;
      const c = center();
      const actionRadius = c.s * 0.22;
      const actionDeg = -36 + state.action * 72;
      const anchor = polar(c.x, c.y, actionRadius, actionDeg);

      const items = model[state.module].items;
      const localR = c.s * 0.14;
      const start = 160;
      const step = 26;
      items.forEach((it, idx) => {
        const d = document.createElement('div');
        d.className = 'bubble item';
        d.innerHTML = `<div><strong>${it[0]}</strong>${it[1]}</div>`;
        const p = polar(anchor.x, anchor.y, localR, start + step * idx);
        setPos(d, p);
        itemLayer.appendChild(d);
      });
    }

    function updateView() {
      moduleLayer.classList.add('show');
      actionLayer.classList.toggle('show', state.level >= 2);
      itemLayer.classList.toggle('show', state.level >= 3);

      const moduleName = modules.find(m => m.key === state.module)?.name || '未选择';
      const actionName = (state.module && state.action != null) ? model[state.module].actions[state.action] : '未选择';

      if (state.level === 1) statusEl.textContent = '当前：模块层';
      if (state.level === 2) statusEl.textContent = `当前：${moduleName} · 功能层`;
      if (state.level === 3) statusEl.textContent = `当前：${moduleName} / ${actionName} · 内容层`;
    }

    function render() {
      renderModules();
      renderActions();
      renderItems();
      updateView();
    }

    function back() {
      if (state.level === 3) {
        state.level = 2;
        state.action = null;
      } else if (state.level === 2) {
        state.level = 1;
        state.module = null;
        state.action = null;
      }
      render();
    }

    document.getElementById('centerBtn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      state.level = 1;
      state.module = null;
      state.action = null;
      render();
    }, { passive: false });

    document.getElementById('backBtn').addEventListener('click', back);
    document.getElementById('resetBtn').addEventListener('click', () => {
      state.level = 1;
      state.module = null;
      state.action = null;
      render();
    });

    window.addEventListener('resize', render);
    render();
  </script>
</body>
</html>
