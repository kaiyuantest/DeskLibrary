<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeskLibrary 悬浮菜单分层 Demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      background: #0b1220;
      color: #dbe8ff;
      font-family: "Microsoft YaHei UI", sans-serif;
      display: grid;
      place-items: center;
    }
    .panel {
      width: min(780px, 96vw);
      border: 1px solid rgba(148, 184, 246, 0.24);
      border-radius: 14px;
      padding: 16px;
      background: rgba(13, 24, 45, 0.86);
    }
    .hint {
      margin: 0 0 10px;
      font-size: 13px;
      line-height: 1.55;
      color: #c9dbff;
    }
    #show-circle-btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: linear-gradient(140deg, #1f6feb, #5aa3ff);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .log {
      margin-top: 12px;
      height: 170px;
      overflow: auto;
      border-radius: 10px;
      border: 1px solid rgba(148, 184, 246, 0.24);
      background: rgba(9, 16, 32, 0.72);
      padding: 10px;
      font-size: 12px;
      line-height: 1.45;
    }
    .line { margin: 0 0 6px; word-break: break-all; }
  </style>
</head>
<body>
  <section class="panel">
    <p class="hint">
      第一层：主 / 存 / 常 / 删 / 始 / 译 / 隐<br>
      触摸有子级圆球立即展开下一层；上一层保留。按需要可到 4 层，叶子层执行动作。<br>
      二层在一层外侧、三层在二层外侧（外侧扇形展开）；鼠标移出会自动收起到第一层。
    </p>
    <button id="show-circle-btn">显示悬浮菜单</button>
    <div id="demo-log" class="log"></div>
  </section>

  <script src="floating-menu.js?v=20260421-1"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const logEl = document.getElementById("demo-log");
      function log(text) {
        const p = document.createElement("p");
        p.className = "line";
        p.textContent = `[${new Date().toLocaleTimeString("zh-CN", { hour12: false })}] ${text}`;
        logEl.prepend(p);
      }

      const tree = {
        id: "root",
        label: "D",
        children: [
          {
            id: "main",
            label: "主",
            tip: "主窗口与页面",
            children: [
              { id: "main.open", label: "主窗", action: { type: "open-main-window" } },
              {
                id: "main.pages",
                label: "页面",
                children: [
                  { id: "page.daily", label: "每日", action: { type: "goto-page", page: "daily" } },
                  { id: "page.common", label: "常用", action: { type: "goto-page", page: "common" } },
                  { id: "page.assets", label: "资源", action: { type: "goto-page", page: "assets" } },
                  { id: "page.cards", label: "卡片", action: { type: "goto-page", page: "cards" } }
                ]
              },
              {
                id: "main.browserTabs",
                label: "浏览器",
                tip: "浏览器选项卡/卡片",
                children: [
                  {
                    id: "main.browserTabs.recent",
                    label: "最近卡片",
                    children: [
                      {
                        id: "tab.shop",
                        label: "shop工作号",
                        children: [
                          { id: "tab.shop.open", label: "打开", action: { type: "open-url", url: "https://shop.demo.example" } },
                          { id: "tab.shop.test", label: "测试", action: { type: "card-test", target: "shop.demo.example" } },
                          { id: "tab.shop.inject", label: "注入", action: { type: "card-inject", target: "shop.demo.example" } }
                        ]
                      },
                      {
                        id: "tab.portal",
                        label: "portal运营号",
                        children: [
                          { id: "tab.portal.open", label: "打开", action: { type: "open-url", url: "https://portal.demo.example" } },
                          { id: "tab.portal.test", label: "测试", action: { type: "card-test", target: "portal.demo.example" } },
                          { id: "tab.portal.inject", label: "注入", action: { type: "card-inject", target: "portal.demo.example" } }
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          },
          {
            id: "save",
            label: "存",
            tip: "每日内容",
            children: [
              { id: "save.now", label: "立即存", action: { type: "quick-save-daily" } },
              {
                id: "save.days3",
                label: "近3天",
                children: [
                  {
                    id: "save.item.a",
                    label: "会议要点",
                    children: [
                      { id: "save.item.a.copy", label: "复制", action: { type: "copy-text", text: "会议要点：完成四层浮球交互联调。" } },
                      { id: "save.item.a.common", label: "转常", action: { type: "move-common", title: "会议要点" } },
                      { id: "save.item.a.delete", label: "删除", action: { type: "delete-record", title: "会议要点" } }
                    ]
                  },
                  {
                    id: "save.item.b",
                    label: "官网链接",
                    children: [
                      { id: "save.item.b.copy", label: "复制", action: { type: "copy-text", text: "https://example.com" } },
                      { id: "save.item.b.open", label: "打开", action: { type: "open-url", url: "https://example.com" } },
                      { id: "save.item.b.common", label: "转常", action: { type: "move-common", title: "官网链接" } }
                    ]
                  },
                  {
                    id: "save.item.c",
                    label: "SQL片段",
                    children: [
                      { id: "save.item.c.copy", label: "复制", action: { type: "copy-text", text: "select id,name from users where status = 1 order by id desc limit 50;" } },
                      { id: "save.item.c.common", label: "转常", action: { type: "move-common", title: "SQL片段" } },
                      { id: "save.item.c.delete", label: "删除", action: { type: "delete-record", title: "SQL片段" } }
                    ]
                  }
                ]
              },
              {
                id: "save.assetsShortcut",
                label: "资源快捷",
                children: [
                  {
                    id: "save.assetsShortcut.folder",
                    label: "项目目录",
                    children: [
                      { id: "save.assetsShortcut.folder.open", label: "打开", action: { type: "open-path", path: "E:\\project\\Click2Save" } },
                      { id: "save.assetsShortcut.folder.copy", label: "复制路径", action: { type: "copy-text", text: "E:\\project\\Click2Save" } }
                    ]
                  }
                ]
              }
            ]
          },
          {
            id: "common",
            label: "常",
            tip: "常用内容",
            children: [
              { id: "common.now", label: "立即常", action: { type: "quick-save-common" } },
              {
                id: "common.days3",
                label: "近3天",
                children: [
                  {
                    id: "common.item.a",
                    label: "登录指引",
                    children: [
                      { id: "common.item.a.copy", label: "复制", action: { type: "copy-text", text: "登录指引：VPN -> SSO -> OTP。" } },
                      { id: "common.item.a.daily", label: "回每", action: { type: "move-daily", title: "登录指引" } },
                      { id: "common.item.a.delete", label: "删除", action: { type: "delete-record", title: "登录指引" } }
                    ]
                  },
                  {
                    id: "common.item.b",
                    label: "发版命令",
                    children: [
                      { id: "common.item.b.copy", label: "复制", action: { type: "copy-text", text: "npm run dist && npm run pack" } },
                      { id: "common.item.b.daily", label: "回每", action: { type: "move-daily", title: "发版命令" } },
                      { id: "common.item.b.delete", label: "删除", action: { type: "delete-record", title: "发版命令" } }
                    ]
                  },
                  {
                    id: "common.item.c",
                    label: "运营后台",
                    children: [
                      { id: "common.item.c.copy", label: "复制", action: { type: "copy-text", text: "https://ops.example.com" } },
                      { id: "common.item.c.open", label: "打开", action: { type: "open-url", url: "https://ops.example.com" } },
                      { id: "common.item.c.daily", label: "回每", action: { type: "move-daily", title: "运营后台" } }
                    ]
                  }
                ]
              }
            ]
          },
          {
            id: "delete",
            label: "删",
            tip: "删除收藏",
            children: [
              { id: "delete.last", label: "删上次", action: { type: "delete-last" } },
              {
                id: "delete.pick",
                label: "选删",
                children: [
                  { id: "delete.pick.a", label: "日报草稿", action: { type: "delete-record", title: "日报草稿" } },
                  { id: "delete.pick.b", label: "测试命令", action: { type: "delete-record", title: "测试命令" } },
                  { id: "delete.pick.c", label: "临时便签", action: { type: "delete-record", title: "临时便签" } }
                ]
              }
            ]
          },
          {
            id: "acc",
            label: "始",
            tip: "累计流程",
            children: [
              { id: "acc.start", label: "开始", action: { type: "acc-start" } },
              { id: "acc.finish", label: "结束", action: { type: "acc-finish" } },
              { id: "acc.undo", label: "撤销", action: { type: "acc-undo" } },
              { id: "acc.cancel", label: "取消", action: { type: "acc-cancel" } }
            ]
          },
          {
            id: "ocr",
            label: "译",
            tip: "截图翻译",
            children: [
              { id: "ocr.start", label: "截图", action: { type: "ocr-start" } },
              {
                id: "ocr.history",
                label: "最近译",
                children: [
                  {
                    id: "ocr.history.a",
                    label: "译文1",
                    children: [
                      { id: "ocr.history.a.copy", label: "复制", action: { type: "copy-text", text: "Recent translation text #1." } },
                      { id: "ocr.history.a.reopen", label: "重开", action: { type: "ocr-start" } }
                    ]
                  },
                  {
                    id: "ocr.history.b",
                    label: "译文2",
                    children: [
                      { id: "ocr.history.b.copy", label: "复制", action: { type: "copy-text", text: "Please re-check deployment window and rollback plan." } },
                      { id: "ocr.history.b.reopen", label: "重开", action: { type: "ocr-start" } }
                    ]
                  }
                ]
              }
            ]
          },
          {
            id: "hide",
            label: "隐",
            tip: "关闭悬浮图标",
            children: [
              { id: "hide.confirm", label: "确认", action: { type: "hide-floating" } },
              { id: "hide.cancel", label: "取消", action: { type: "noop", message: "已取消关闭" } }
            ]
          }
        ]
      };

      function findNodeById(node, id) {
        if (!node) return null;
        if (node.id === id) return node;
        const children = Array.isArray(node.children) ? node.children : [];
        for (let i = 0; i < children.length; i += 1) {
          const found = findNodeById(children[i], id);
          if (found) return found;
        }
        return null;
      }

      function buildTenMockRecords(groupId, labelPrefix, mode) {
        const list = [];
        for (let i = 1; i <= 10; i += 1) {
          const itemTitle = `${labelPrefix}${i}`;
          const baseId = `${groupId}.item.${i}`;
          const children = [];
          if (mode === "save") {
            children.push(
              { id: `${baseId}.copy`, label: "复制", action: { type: "copy-text", text: `${itemTitle}：这是近3天模拟内容第 ${i} 条。` } },
              { id: `${baseId}.common`, label: "转常", action: { type: "move-common", title: itemTitle } },
              { id: `${baseId}.delete`, label: "删除", action: { type: "delete-record", title: itemTitle } }
            );
          } else {
            children.push(
              { id: `${baseId}.copy`, label: "复制", action: { type: "copy-text", text: `${itemTitle}：这是常用近3天模拟内容第 ${i} 条。` } },
              { id: `${baseId}.daily`, label: "回每", action: { type: "move-daily", title: itemTitle } },
              { id: `${baseId}.delete`, label: "删除", action: { type: "delete-record", title: itemTitle } }
            );
          }
          if (i % 3 === 0) {
            children.push({ id: `${baseId}.open`, label: "打开", action: { type: "open-url", url: `https://example.com/mock-${mode}-${i}` } });
          }
          list.push({
            id: baseId,
            label: itemTitle,
            children
          });
        }
        return list;
      }

      const saveDays3 = findNodeById(tree, "save.days3");
      if (saveDays3) {
        saveDays3.children = buildTenMockRecords("save.days3", "每日条目", "save");
      }
      const commonDays3 = findNodeById(tree, "common.days3");
      if (commonDays3) {
        commonDays3.children = buildTenMockRecords("common.days3", "常用条目", "common");
      }

      const menu = new FloatingCircleMenu({
        buttonId: "show-circle-btn",
        tree: tree,
        onAction: function (payload) {
          const label = payload && payload.node ? payload.node.label : "(unknown)";
          const type = payload && payload.action ? payload.action.type : "unknown";
          log(`执行 ${label} / ${type} -> ${payload.message}`);
        }
      });

      log("初始化完成：已加载项目内容树（1-4层）。");
      window.__xxiaoqiuMenu = menu;
    });
  </script>
</body>
</html>
