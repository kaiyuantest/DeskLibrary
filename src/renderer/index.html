<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click2Save</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="window-shell">
      <header class="window-titlebar">
        <div class="window-brand">
          <div class="brand-mark" title="Click2Save">C</div>
          <div class="window-brand-text">
            <strong>Click2Save</strong>
            <span>桌面收藏工作台</span>
          </div>
        </div>
        <div class="window-drag-space"></div>
        <div class="window-controls">
          <button id="windowMinBtn" class="window-control-btn" title="最小化">─</button>
          <button id="windowMaxBtn" class="window-control-btn" title="最大化">□</button>
          <button id="windowCloseBtn" class="window-control-btn danger" title="关闭">×</button>
        </div>
      </header>

      <div class="app-shell">
        <aside class="sidebar">
          <div class="sidebar-brand">
            <div class="sidebar-badge">Workboard</div>
            <div class="sidebar-copy">
              <h2>捕捉有价值的片段</h2>
              <p>把每日临时信息变成可搜索、可回收、可沉淀的资料库。</p>
            </div>
          </div>

          <nav class="nav-rail">
            <button id="dailyPageBtn" class="rail-btn active" title="每日内容">
              <span class="rail-icon">☰</span>
              <span class="rail-label">每日内容</span>
            </button>
            <button id="commonPageBtn" class="rail-btn" title="常用">
              <span class="rail-icon">★</span>
              <span class="rail-label">常用</span>
            </button>
            <button id="backupPageBtn" class="rail-btn" title="备份库">
              <span class="rail-icon">⬒</span>
              <span class="rail-label">备份库</span>
            </button>
            <button id="linksPageBtn" class="rail-btn" title="快捷入口">
              <span class="rail-icon">↗</span>
              <span class="rail-label">快捷入口</span>
            </button>
            <button id="settingsPageBtn" class="rail-btn" title="设置">
              <span class="rail-icon">⚙</span>
              <span class="rail-label">偏好设置</span>
            </button>
          </nav>

          <div class="sidebar-bottom">
            <button id="refreshBtn" class="rail-btn ghost" title="刷新">
              <span class="rail-icon">↻</span>
              <span class="rail-label">刷新快照</span>
            </button>
            <button id="mobileDateToggleBtn" class="mobile-tool-btn rail-btn ghost" title="日期筛选">
              <span class="rail-icon">📅</span>
              <span class="rail-label">日期筛选</span>
            </button>
            <button id="mobileFilterToggleBtn" class="mobile-tool-btn rail-btn ghost" title="日期标签">
              <span class="rail-icon">🏷</span>
              <span class="rail-label">日期标签</span>
            </button>
          </div>
        </aside>

        <main class="main-shell">
          <header class="topbar">
            <nav class="mobile-nav-bar">
              <button id="mobileDailyNavBtn" class="mobile-nav-btn active" type="button">每日</button>
              <button id="mobileCommonNavBtn" class="mobile-nav-btn" type="button">常用</button>
              <button id="mobileBackupNavBtn" class="mobile-nav-btn" type="button">备份</button>
              <button id="mobileLinksNavBtn" class="mobile-nav-btn" type="button">快捷</button>
              <button id="mobileSettingsNavBtn" class="mobile-nav-btn" type="button">设置</button>
            </nav>

            <div class="topbar-copy">
              <div class="eyebrow">Content Console</div>
              <h1 id="pageTitle">每日内容</h1>
              <p id="statusText">后台监听中</p>
            </div>

            <section class="control-deck">
              <label class="control-card search-card">
                <span class="control-label">快速搜索</span>
                <input id="dailySearchInput" class="search-input" type="text" placeholder="搜索内容 / 备注 / 标题" />
              </label>

              <label class="control-card date-card mobile-collapsible">
                <span class="control-label">日期筛选</span>
                <input id="dailyDatePicker" class="date-input" type="date" />
              </label>

              <section class="control-card filter-card mobile-collapsible">
                <div class="control-label">日期标签</div>
                <div id="dailyFilterBar" class="filter-bar"></div>
              </section>
            </section>
          </header>

          <div class="page-stack">
            <section id="dailyPage" class="page-view page-scroll">
              <section class="composer-inline">
                <textarea id="newRecordDraft" rows="2" placeholder="快速记一条备忘、命令或片段..." spellcheck="false"></textarea>
                <button id="createRecordBtn" class="icon-action primary" title="新增">＋</button>
              </section>

              <section class="section-head compact">
                <span>每日内容</span>
                <span id="dailyCount" class="count-chip">0</span>
              </section>
              <section id="recordsList" class="cards-grid"></section>
              <div id="dailyPagination" class="pagination-bar"></div>
            </section>

            <section id="commonPage" class="page-view page-scroll hidden">
              <div class="other-grid">
                <section class="panel minimalist-panel">
                  <div class="section-head">
                    <span>常用</span>
                    <span id="commonCount" class="count-chip">0</span>
                  </div>
                  <section id="commonRecordsList" class="cards-grid compact-grid"></section>
                </section>

                <section class="panel minimalist-panel">
                  <div class="section-head">
                    <span>今日高频</span>
                  </div>
                  <div id="topDailyList" class="quick-list"></div>
                </section>

                <section class="panel minimalist-panel">
                  <div class="section-head">
                    <span>最近命中</span>
                  </div>
                  <div id="recentDailyList" class="quick-list"></div>
                </section>
              </div>
            </section>

            <section id="assetsPage" class="page-view page-scroll hidden">
              <section class="panel minimalist-panel asset-intake-panel">
                <div class="section-head">
                  <span id="assetsPageHeading">备份库</span>
                  <span id="assetsCount" class="count-chip">0</span>
                </div>

                <div class="asset-toolbar">
                  <div id="assetDropZone" class="asset-dropzone" tabindex="0">
                    <strong id="assetDropTitle">拖入文件或文件夹</strong>
                    <span id="assetDropHint">松手后自动导入当前页面</span>
                  </div>

                  <div class="asset-toolbar-actions">
                    <button id="pickAssetFilesBtn" class="text-action" type="button">选择文件</button>
                    <button id="pickAssetFoldersBtn" class="text-action" type="button">选择文件夹</button>
                  </div>
                </div>

                <div class="asset-filter-row">
                  <label class="control-card search-card asset-search-card">
                    <span class="control-label">搜索资源</span>
                    <input id="assetSearchInput" class="search-input" type="text" placeholder="搜索文件名 / 路径 / 备注" />
                  </label>

                  <div id="assetTypeFilterBar" class="filter-bar asset-type-filter"></div>
                </div>
              </section>

              <section class="resource-workbench">
                <section id="assetsList" class="cards-grid"></section>

                <aside id="assetDetailPanel" class="panel minimalist-panel asset-detail-panel">
                  <div class="section-head">
                    <span id="assetDetailTitle">资源详情</span>
                    <span id="assetDetailStatus" class="count-chip">未选择</span>
                  </div>

                  <div id="assetDetailEmpty" class="asset-detail-empty">点击左侧卡片查看详情并编辑备注。</div>

                  <div id="assetDetailBody" class="asset-detail-body hidden">
                    <div id="assetDetailMeta" class="asset-detail-meta"></div>
                    <div id="assetDetailPaths" class="asset-detail-paths"></div>
                    <label class="asset-note-editor">
                      <span>备注</span>
                      <textarea id="assetNoteInput" rows="6" placeholder="为这个资源补充说明、用途或关键词"></textarea>
                    </label>
                    <div class="asset-detail-actions">
                      <button id="assetOpenPrimaryBtn" class="text-action" type="button">打开资源</button>
                      <button id="assetOpenSourceBtn" class="text-action" type="button">打开原位置</button>
                      <button id="assetOpenLocationBtn" class="text-action" type="button">打开所在位置</button>
                      <button id="assetSaveNoteBtn" class="text-action" type="button">保存备注</button>
                      <button id="assetDeleteBtn" class="text-action danger" type="button">删除资源</button>
                    </div>
                  </div>
                </aside>
              </section>
            </section>

            <section id="settingsPage" class="page-view page-scroll hidden">
              <section class="panel minimalist-panel settings-panel">
                <div class="section-head settings-head">
                  <span>行为设置</span>
                  <span class="count-chip">系统级</span>
                </div>

                <div class="settings-list">
                  <label class="setting-row"><span>自动判断</span><input id="autoJudgmentEnabled" type="checkbox" /></label>
                  <label class="setting-row"><span>Alt+Q</span><input id="altQEnabled" type="checkbox" /></label>
                  <label class="setting-row"><span>累计复制</span><input id="doubleCopyEnabled" type="checkbox" /></label>
                  <label class="setting-row"><span>复制后按键</span><input id="copyThenKeyEnabled" type="checkbox" /></label>
                  <label class="setting-row"><span>开机启动</span><input id="startupLaunchEnabled" type="checkbox" /></label>
                  <label class="setting-row"><span>悬浮图标</span><input id="floatingIconEnabled" type="checkbox" /></label>
                  <label class="setting-row"><span>靠边显示</span><input id="dockToEdgeEnabled" type="checkbox" /></label>
                </div>

                <div class="settings-key-row">
                  <span>复制后按键</span>
                  <input id="postCopyKey" type="text" placeholder="Shift / Ctrl / Alt" />
                </div>

                <p class="settings-hint">开机启动在保存后生效，通常需要下次登录系统时验证。</p>
                <button id="saveSettingsBtn" class="save-pill">保存设置</button>
              </section>
            </section>
          </div>
        </main>
      </div>
    </div>

    <div id="recordModal" class="modal hidden">
      <div id="modalOverlay" class="modal-overlay"></div>
      <section class="modal-card">
        <div class="modal-head">
          <div>
            <div id="modalTitle" class="modal-title">请选择一条记录</div>
            <div id="modalSubline" class="modal-subline">-</div>
          </div>
          <button id="closeModalBtn" class="icon-action" title="关闭">×</button>
        </div>

        <div class="modal-meta">
          <div><span class="meta-label">类型</span><span id="modalType">-</span></div>
          <div><span class="meta-label">方式</span><span id="modalMethod">-</span></div>
          <div><span class="meta-label">分类</span><span id="modalCategory">-</span></div>
          <div><span class="meta-label">命中</span><span id="modalHitCount">-</span></div>
          <div><span class="meta-label">最近</span><span id="modalLastCapturedAt">-</span></div>
        </div>

        <div class="modal-body">
          <div id="modalImagePreviewBlock" class="image-block hidden">
            <div class="image-frame modal-image-frame">
              <img id="modalImage" alt="图片预览" />
            </div>
            <button id="openImagePathBtn" class="text-action">打开图片位置</button>
            <div id="modalImagePath" class="minor-text break-all">-</div>
          </div>

          <textarea id="detailTextContent" rows="9" placeholder="文本内容"></textarea>
          <textarea id="detailNote" rows="4" placeholder="备注"></textarea>
          <div id="detailWindowTitle" class="minor-text break-all">-</div>
        </div>

        <div class="modal-actions">
          <button id="saveContentBtn" class="text-action">保存正文</button>
          <button id="saveNoteBtn" class="text-action">保存备注</button>
          <button id="moveToCommonBtn" class="text-action">加入常用</button>
          <button id="moveToDailyBtn" class="text-action">移回每日</button>
          <button id="deleteRecordBtn" class="text-action danger">删除</button>
        </div>
      </section>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
