<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Menu</title>
    <link rel="stylesheet" href="./floating-menu.css" />
  </head>
  <body>
    <section class="menu-shell">
      <header class="menu-head">
        <div>
          <strong>Click2Save</strong>
          <span id="observeStatus">正在观察 1.5 秒复制窗口</span>
        </div>
        <button id="closeMenuBtn" class="icon-btn" type="button">×</button>
      </header>

      <div class="menu-group">
        <button id="openMainBtn" class="menu-btn primary" type="button">打开主界面</button>
        <button id="collectNowBtn" class="menu-btn" type="button">立即收藏剪贴板</button>
        <button id="collectCommonBtn" class="menu-btn" type="button">收藏到常用</button>
      </div>

      <div class="menu-group toggles">
        <label class="toggle-row">
          <span>自动判断</span>
          <input id="autoJudgmentEnabled" type="checkbox" />
        </label>
        <label class="toggle-row">
          <span>累计复制</span>
          <input id="doubleCopyEnabled" type="checkbox" />
        </label>
        <label class="toggle-row">
          <span>复制后按键</span>
          <input id="copyThenKeyEnabled" type="checkbox" />
        </label>
        <label class="toggle-row">
          <span>靠边显示</span>
          <input id="dockToEdgeEnabled" type="checkbox" />
        </label>
      </div>

      <div class="menu-foot">
        <span id="postCopyKeyText">复制后按键: Shift</span>
        <button id="quitBtn" class="menu-btn danger" type="button">退出程序</button>
      </div>
    </section>

    <script src="./floating-menu.js"></script>
  </body>
</html>
